<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AGRI-GIS CALABARZON — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#0d1117;--ink2:#161b22;--ink3:#21262d;
  --rice:#d4a843;--rice-light:#f0d080;
  --green:#22c55e;--red:#ef4444;
  --text:#c9d1d9;--text2:#8b949e;--muted:#4b5870;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.14);
  --r:10px;
}
html,body{height:100%;background:var(--ink);color:var(--text);
  font-family:'Instrument Sans',sans-serif;font-size:14px;line-height:1.5;}

/* ── BACKGROUND ── */
body{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
  background:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(212,168,67,.12) 0%, transparent 60%),
    var(--ink);
}

/* ── CARD ── */
.card{
  background:var(--ink2);border:1px solid var(--border2);
  border-radius:16px;padding:40px 36px 36px;
  width:100%;max-width:380px;
  box-shadow:0 24px 64px rgba(0,0,0,.55);
}

/* ── LOGO ── */
.logo{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
.logo-icon{
  width:42px;height:42px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(135deg,var(--rice),#9a6e20);
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.logo-name{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:700;
  color:#fff;letter-spacing:-.01em;line-height:1.3;}
.logo-sub{font-size:9.5px;color:var(--text2);letter-spacing:.04em;}

/* ── HEADING ── */
.heading{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:700;
  color:#fff;margin-bottom:6px;}
.subheading{font-size:12px;color:var(--text2);margin-bottom:28px;}

/* ── FORM ── */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:16px;}
.field label{font-size:9px;text-transform:uppercase;letter-spacing:.14em;color:var(--text2);}
.field input{
  background:var(--ink3);border:1px solid var(--border2);border-radius:8px;
  color:var(--text);font-family:'Instrument Sans',sans-serif;font-size:14px;
  padding:10px 12px;outline:none;width:100%;transition:border-color .2s;
}
.field input:focus{border-color:rgba(212,168,67,.6);}
.field input::placeholder{color:var(--muted);}

.login-btn{
  width:100%;background:var(--rice);color:#0d1117;border:none;border-radius:var(--r);
  font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.06em;padding:13px;cursor:pointer;
  transition:opacity .2s,transform .1s;margin-top:8px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.login-btn:hover{opacity:.88;}
.login-btn:active{transform:scale(.98);}
.login-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── ERROR ── */
.error-msg{
  background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);
  border-radius:8px;padding:10px 13px;font-size:12px;color:#fca5a5;
  margin-bottom:16px;display:none;
}
.error-msg.show{display:block;}

/* ── SPINNER ── */
.spinner{
  width:14px;height:14px;border:2px solid rgba(0,0,0,.25);
  border-top-color:#0d1117;border-radius:50%;
  animation:spin .65s linear infinite;display:none;
}
.login-btn.loading .spinner{display:block;}
.login-btn.loading .btn-txt{display:none;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DEMO CREDS ── */
.demo{
  margin-top:20px;padding:12px 14px;
  background:var(--ink3);border:1px solid var(--border);border-radius:8px;
}
.demo-title{font-size:9px;text-transform:uppercase;letter-spacing:.14em;
  color:var(--muted);margin-bottom:8px;}
.demo-row{display:flex;justify-content:space-between;font-size:11px;
  color:var(--text2);margin-bottom:4px;}
.demo-row:last-child{margin-bottom:0;}
.demo-row span:last-child{font-family:monospace;color:var(--rice);font-size:11px;}

@media(max-width:420px){
  .card{padding:28px 22px 24px;}
}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🌾</div>
    <div>
      <div class="logo-name">AGRI-GIS CALABARZON</div>
      <div class="logo-sub">Rice Yield Prediction System · Region IV-A</div>
    </div>
  </div>

  <div class="heading">Sign in</div>
  <div class="subheading">Enter your credentials to access the system.</div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter username" autocomplete="username"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"/>
  </div>

  <button class="login-btn" id="loginBtn" onclick="doLogin()">
    <div class="spinner"></div>
    <span class="btn-txt">Sign In →</span>
  </button>

  <div class="demo">
    <div class="demo-title">Demo Credentials</div>
    <div class="demo-row"><span>👤 User (read-only)</span><span>user / user123</span></div>
    <div class="demo-row"><span>🔑 Admin (full access)</span><span>admin / admin123</span></div>
  </div>
</div>

<script>
// Allow Enter key to submit
document.addEventListener('keydown', e => {
  if(e.key === 'Enter') doLogin();
});

async function doLogin(){
  const btn  = document.getElementById('loginBtn');
  const err  = document.getElementById('errorMsg');
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value.trim();

  if(!user || !pass){
    err.textContent = 'Please enter both username and password.';
    err.classList.add('show'); return;
  }

  btn.classList.add('loading'); btn.disabled = true;
  err.classList.remove('show');

  try {
    const res  = await fetch('/api/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username: user, password: pass})
    });
    const data = await res.json();
    if(!res.ok){
      err.textContent = data.error || 'Login failed.';
      err.classList.add('show');
    } else {
      window.location.href = '/';
    }
  } catch(e) {
    err.textContent = 'Could not connect to server. Make sure Flask is running.';
    err.classList.add('show');
  } finally {
    btn.classList.remove('loading'); btn.disabled = false;
  }
}
</script>
</body>
</html>
